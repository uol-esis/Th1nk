name: Th1nk Demo Secured
services:
  frontend:
    build:
      context: git@github.com:uol-esis/Th1nk.git#main:frontend
      args:
        OAUTH_URL: http://localhost:8085
        OAUTH_REALM: th1nk
        OAUTH_CLIENT_ID: th1nk
        OAUTH_ENABLED: true
    environment:
      API_HOST: http://127.0.0.1:8080
      METABASE_HOST: http://127.0.0.1:3000
    network_mode: host

  backend:
    build:
      context: git@github.com:uol-esis/Th1nk.git#main:backend
    environment:
      SPRING_DATASOURCE_USERNAME: example
      SPRING_DATASOURCE_PASSWORD: example
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/example
      TH1NK_MB_API_KEY: key
      TH1NK_MB_API_GENERAL_KEY: ${MB_GENERATED_KEY}
      TH1NK_MB_BASEPATH: http://localhost:3000/api
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:8085/realms/th1nk
    network_mode: host
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_started

  keycloak:
    image: quay.io/keycloak/keycloak:26.4.5
    ports:
      - "8085:8080"
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
      - KC_HOSTNAME=http://localhost:8085/
    command: [ "start-dev" , "--import-realm" ]
    volumes:
      - "./data/realms:/opt/keycloak/data/import"

  db:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: example
      POSTGRES_PASSWORD: example
      POSTGRES_DB: example
      PGUSER: example
    # Add a volume to the db if you want to reuse uploaded data
    # volumes:
    #   - db-data:/var/lib/postgresql/data
    healthcheck:
      start_period: 5s
      test: [ "CMD-SHELL", "pg_isready" ]

  metabase:
    image: metabase/metabase:v0.57.2.1
    environment:
     MB_API_KEY:  key    
    volumes:
      - /dev/urandom:/dev/random:ro
    ports:
      - 3000:3000
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: curl --fail -I http://localhost:3000/api/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
